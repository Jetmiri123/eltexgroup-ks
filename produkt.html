<!DOCTYPE html>
<html lang="sq" data-wf-site="64c7fd134e21b14134717e91">
<head>
  <meta charset="utf-8">
  <base href="/">
  <title>Produkt — Eltex Group</title>
  <meta content="Detajet e produktit — Eltex Group" name="description">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="css/gelander-fabrik.webflow.css" rel="stylesheet" type="text/css">
  <link href="css/eltex-custom.css" rel="stylesheet" type="text/css">
  <link href="css/eltex-scroll.css" rel="stylesheet" type="text/css">
  <link href="css/products.css" rel="stylesheet" type="text/css">
  <script type="text/javascript">!function(o,c){var n=c.documentElement,t=" w-mod-";n.className+=t+"js",("ontouchstart"in o||o.DocumentTouch&&c instanceof DocumentTouch)&&(n.className+=t+"touch")}(window,document);</script>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
</head>
<body>
  <div data-eltex-nav data-page="produkte"></div>
  <script src="js/eltex-nav.js"></script>

  <section class="main_section product-detail-section">
    <div class="wrapper">
      <nav class="product-breadcrumb" id="product-breadcrumb" aria-label="Breadcrumb">
        <a href="/">Home</a>
        <span>/</span>
        <a href="/produkte">Produkte</a>
        <span>/</span>
        <span id="breadcrumb-current">Produkt</span>
      </nav>

      <div id="product-not-found" class="product-not-found" hidden>
        <h1 class="big-text">Produkti nuk u gjet</h1>
        <p class="paragraph">Ky produkt nuk ekziston ose është hequr nga katalogu.</p>
        <a href="/produkte" class="orange_button w-inline-block" style="margin-top:1.5rem;">
          <div class="button_text">Kthehu te Produktet</div>
          <img src="images/Vector-9.svg" loading="lazy" alt="">
        </a>
      </div>

      <div id="product-detail" class="product-detail" hidden>
        <div class="product-detail-grid">
          <div class="product-detail-media">
            <img id="product-image" src="" alt="" class="product-detail-image">
            <div id="product-gallery" class="product-gallery" hidden></div>
          </div>
          <div class="product-detail-info">
            <div class="product-detail-category" id="product-category"></div>
            <h1 class="product-detail-title" id="product-title"></h1>
            <div class="product-detail-summary product-description-body" id="product-summary" hidden></div>
            <div class="product-detail-meta">
              <div class="product-detail-price" id="product-price"></div>
              <div class="product-detail-sku" id="product-sku" hidden></div>
            </div>
            <div class="product-detail-actions">
              <button type="button" class="btn-add-cart btn-add-cart-lg" id="product-add-cart">Shto në Shportë</button>
              <a href="/contact-us" class="product-contact-link">Porosi me shumicë →</a>
            </div>
          </div>
        </div>

        <div class="product-detail-details" id="product-details" hidden>
          <div class="product-detail-specs" id="product-specs" hidden>
            <h2 class="product-detail-label">Specifikimet</h2>
            <table class="product-specs-table" id="product-specs-table"></table>
          </div>
          <div class="product-detail-description" id="product-description-wrap" hidden>
            <h2 class="product-detail-label">Përshkrimi</h2>
            <div class="product-description-body" id="product-description"></div>
          </div>
        </div>

        <div class="product-related">
          <h2 class="product-related-title">Produkte <span class="orange">të Ngjashme</span></h2>
          <div class="products-grid product-related-grid" id="product-related"></div>
        </div>
      </div>
    </div>
  </section>

  <div data-eltex-footer></div>

  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=64c7fd134e21b14134717e91" crossorigin="anonymous"></script>
  <script src="js/webflow.js"></script>
  <script src="js/product-utils.js"></script>
  <script src="js/eltex-cart.js"></script>
  <script src="js/product-detail.js"></script>
  <script src="js/eltex-scroll.js"></script>
  <script src="js/eltex-cta.js"></script>
  <script src="js/eltex-fixes.js"></script>
  <script src="js/eltex-footer.js"></script>
</body>
</html>
